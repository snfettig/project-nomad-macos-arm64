name: project-nomad
services:
  admin:
    image: project-nomad-admin:latest
    pull_policy: never
    container_name: nomad_admin
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    volumes:
      - NOMAD_DIR_PLACEHOLDER/storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - NOMAD_DIR_PLACEHOLDER/entrypoint.sh:/usr/local/bin/entrypoint.sh
      - NOMAD_DIR_PLACEHOLDER/wait-for-it.sh:/usr/local/bin/wait-for-it.sh
      - nomad-update-shared:/app/update-shared
    environment:
      - NODE_ENV=production
      - PORT=8080
      - LOG_LEVEL=debug
      - APP_KEY=replaceme
      - HOST=0.0.0.0
      - URL=replaceme
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nomad
      - DB_USER=nomad_user
      - DB_PASSWORD=replaceme
      - DB_NAME=nomad
      - DB_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OLLAMA_HOST=http://host.docker.internal:11434
      - NOMAD_STORAGE_PATH=NOMAD_DIR_PLACEHOLDER/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  dozzle:
    image: amir20/dozzle:v10.0
    container_name: nomad_dozzle
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOZZLE_ENABLE_ACTIONS=true
      - DOZZLE_ENABLE_SHELL=true
  mysql:
    image: mysql:8.0
    container_name: nomad_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=replaceme
      - MYSQL_DATABASE=nomad
      - MYSQL_USER=nomad_user
      - MYSQL_PASSWORD=replaceme
    volumes:
      - NOMAD_DIR_PLACEHOLDER/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
  redis:
    image: redis:7-alpine
    container_name: nomad_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - NOMAD_DIR_PLACEHOLDER/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
  updater:
    build:
      context: ./sidecar-updater
      dockerfile: Dockerfile
    container_name: nomad_updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - NOMAD_DIR_PLACEHOLDER:/opt/project-nomad
      - nomad-update-shared:/shared
  disk-collector:
    build:
      context: ./sidecar-disk-collector
      dockerfile: Dockerfile
    container_name: nomad_disk_collector
    restart: unless-stopped
    volumes:
      - NOMAD_DIR_PLACEHOLDER/storage:/storage

volumes:
  nomad-update-shared:
    driver: local
